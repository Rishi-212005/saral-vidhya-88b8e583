<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#1a1050"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title{font:700 56px 'Fraunces', serif; fill:#fff}
      .subtitle{font:600 24px 'Inter', sans-serif; fill:#cbd5e1}
      .bullet{font:500 18px 'Inter', sans-serif; fill:#e2e8f0}
      .check{fill:#06b6d4}
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Animated orbs in background -->
  <circle cx="100" cy="100" r="150" fill="#7c3aed" opacity="0.1"/>
  <circle cx="1300" cy="600" r="200" fill="#06b6d4" opacity="0.08"/>
  
  <!-- Main content container -->
  <g transform="translate(60,40)">
    <!-- Section title -->
    <text class="title" x="0" y="60">Gamification</text>
    
    <!-- Divider line -->
    <line x1="0" y1="80" x2="200" y2="80" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Left content column -->
    <g transform="translate(0,120)">
      <!-- Bullet 1 -->
      <g>
        <circle cx="16" cy="16" r="6" class="check"/>
        <line x1="28" y1="0" x2="500" y2="0" stroke="#1e293b" stroke-width="1"/>
        <text class="bullet" x="28" y="20">Dynamic Calibration: The system automatically upgrades or downgrades students' subject-wise</text>
        <text class="bullet" x="28" y="44">personas based on real-time learning and performance.</text>
      </g>
      
      <!-- Bullet 2 -->
      <g transform="translate(0,90)">
        <circle cx="16" cy="16" r="6" class="check"/>
        <line x1="28" y1="0" x2="500" y2="0" stroke="#1e293b" stroke-width="1"/>
        <text class="bullet" x="28" y="20">Gamified Experience: Student leaderboards and badges designed to foster healthy</text>
        <text class="bullet" x="28" y="44">competition and greater engagement with learning content</text>
      </g>
      
      <!-- Bullet 3 -->
      <g transform="translate(0,180)">
        <circle cx="16" cy="16" r="6" class="check"/>
        <line x1="28" y1="0" x2="500" y2="0" stroke="#1e293b" stroke-width="1"/>
        <text class="bullet" x="28" y="20">Balanced Usage: Designed for 6–8 hours per week to maximize learning impact while</text>
        <text class="bullet" x="28" y="44">avoiding screen time fatigue.</text>
      </g>
      
      <!-- Bullet 4 -->
      <g transform="translate(0,270)">
        <circle cx="16" cy="16" r="6" class="check"/>
        <line x1="28" y1="0" x2="500" y2="0" stroke="#1e293b" stroke-width="1"/>
        <text class="bullet" x="28" y="20">Inclusive Design: Specialized models for students with special needs, ensuring</text>
        <text class="bullet" x="28" y="44">accessibility for all.</text>
      </g>
    </g>
    
    <!-- Right side visualization -->
    <g transform="translate(800,80)" filter="url(#glow)">
      <!-- Circular progress ring -->
      <circle cx="120" cy="120" r="100" fill="none" stroke="#1e293b" stroke-width="2"/>
      <circle cx="120" cy="120" r="100" fill="none" stroke="url(#purpleGrad)" stroke-width="6" stroke-dasharray="471 628" stroke-linecap="round" opacity="0.8"/>
      
      <!-- Inner circle with gradient -->
      <circle cx="120" cy="120" r="80" fill="url(#purpleGrad)" opacity="0.15"/>
      
      <!-- Center text -->
      <text x="120" y="115" text-anchor="middle" font-size="28" font-weight="700" fill="#06b6d4">Level</text>
      <text x="120" y="145" text-anchor="middle" font-size="32" font-weight="700" fill="#fff">UP</text>
      
      <!-- Decorative stars around circle -->
      <g fill="#06b6d4" opacity="0.6">
        <polygon points="120,20 125,35 142,35 130,45 136,62 120,52 104,62 110,45 98,35 115,35" transform="translate(0,-10)"/>
        <polygon points="250,120 256,132 272,132 261,142 266,158 250,148 234,158 239,142 228,132 244,132" transform="scale(0.7)"/>
        <polygon points="120,220 125,235 142,235 130,245 136,262 120,252 104,262 110,245 98,235 115,235" transform="translate(0,10)"/>
      </g>
    </g>
  </g>
</svg>
