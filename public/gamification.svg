<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#1a1050"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title{font:800 72px 'Fraunces', serif; fill:#fff; letter-spacing:-0.02em}
      .bullet{font:500 20px 'Inter', sans-serif; fill:#e2e8f0}
      .check{fill:#06b6d4}
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Background orbs -->
  <circle cx="200" cy="150" r="180" fill="#7c3aed" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1200" cy="700" r="220" fill="#06b6d4" opacity="0.06" filter="url(#glow)"/>
  
  <!-- Main container -->
  <g transform="translate(80,60)">
    <!-- Title -->
    <text class="title" x="0" y="70">Gamification Features</text>
    <line x1="0" y1="95" x2="500" y2="95" stroke="url(#purpleGrad)" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Left column: Features -->
    <g transform="translate(0,160)">
      <!-- Feature 1 -->
      <g>
        <circle cx="20" cy="20" r="8" class="check"/>
        <text class="bullet" x="45" y="15">Dynamic Calibration</text>
        <text class="bullet" x="45" y="35" font-size="16" fill="#cbd5e1">System auto-upgrades/downgrades personas based on performance</text>
      </g>
      
      <!-- Feature 2 -->
      <g transform="translate(0,100)">
        <circle cx="20" cy="20" r="8" class="check"/>
        <text class="bullet" x="45" y="15">Gamified Experience</text>
        <text class="bullet" x="45" y="35" font-size="16" fill="#cbd5e1">Leaderboards and badges for healthy competition and engagement</text>
      </g>
      
      <!-- Feature 3 -->
      <g transform="translate(0,200)">
        <circle cx="20" cy="20" r="8" class="check"/>
        <text class="bullet" x="45" y="15">Balanced Usage</text>
        <text class="bullet" x="45" y="35" font-size="16" fill="#cbd5e1">Optimized for 6–8 hours/week to prevent screen fatigue</text>
      </g>
      
      <!-- Feature 4 -->
      <g transform="translate(0,300)">
        <circle cx="20" cy="20" r="8" class="check"/>
        <text class="bullet" x="45" y="15">Inclusive Design</text>
        <text class="bullet" x="45" y="35" font-size="16" fill="#cbd5e1">Specialized models for students with special needs</text>
      </g>
    </g>
    
    <!-- Right side: Level UP visualization -->
    <g transform="translate(900,120)" filter="url(#glow)">
      <!-- Outer ring with progress -->
      <circle cx="140" cy="140" r="130" fill="none" stroke="#1e293b" stroke-width="2"/>
      <circle cx="140" cy="140" r="130" fill="none" stroke="url(#purpleGrad)" stroke-width="8" 
              stroke-dasharray="550 820" stroke-linecap="round" opacity="0.9"/>
      
      <!-- Middle circle -->
      <circle cx="140" cy="140" r="100" fill="url(#purpleGrad)" opacity="0.15"/>
      
      <!-- Inner glowing effect -->
      <circle cx="140" cy="140" r="85" fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.5"/>
      
      <!-- Center badge -->
      <circle cx="140" cy="140" r="70" fill="#0f0a2e" stroke="url(#cyanGrad)" stroke-width="3"/>
      
      <!-- Level UP text -->
      <text x="140" y="125" text-anchor="middle" font-size="36" font-weight="800" fill="#06b6d4">LEVEL</text>
      <text x="140" y="165" text-anchor="middle" font-size="48" font-weight="900" fill="#fff">UP</text>
      
      <!-- Decorative stars -->
      <g fill="#06b6d4" opacity="0.7">
        <polygon points="140,20 148,45 175,45 155,62 162,87 140,70 118,87 125,62 105,45 132,45" transform="scale(1.2)"/>
        <polygon points="300,140 310,160 333,160 316,175 323,198 300,183 277,198 284,175 267,160 290,160" transform="scale(0.9)"/>
        <polygon points="140,260 148,285 175,285 155,302 162,327 140,310 118,327 125,302 105,285 132,285" transform="scale(1.2)"/>
      </g>
    </g>
  </g>
</svg>
